name: Publish to PyPI

# Publishes to PyPI on a pushed version tag (e.g. `v0.1.0`) using PyPI
# Trusted Publishing (OIDC) — no API token is stored in the repo.
# One-time setup: on PyPI, add a trusted publisher for this repo pointing at
# the `pypi` environment and workflow file `publish.yml`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
